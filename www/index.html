<!DOCTYPE html>
<html>
<head>
  <title>FunChat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Arial;
      box-sizing: border-box;
    }

    body {
      background: #0b141a;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* LOGIN */
    #login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0b141a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #login input {
      width: 240px;
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
    }

    #login button {
      width: 260px;
      padding: 10px;
      margin: 5px;
      background: #00a884;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* APP */
#app {
  display: none;
  height: 100vh;
  width: 100%;
}
    /* SIDEBAR */
    #sidebar {
      width: 300px;
      background: #111b21;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      background: #202c33;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #searchBox {
      padding: 8px;
      margin: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .user {
      padding: 12px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .user:hover {
      background: #1f2c33;
    }

    /* CHAT */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chatHeader {
      background: #202c33;
      padding: 10px;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #0b141a;
    }

    .msg {
      max-width: 60%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .me {
      background: #005c4b;
      margin-left: auto;
    }

    .other {
      background: #202c33;
      margin-right: auto;
    }

    #inputArea {
  display: flex;
  align-items: center;
  padding: 15px;
  background: #202c33;
  gap: 8px;
}

#inputArea input {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  outline: none;
  font-size: 16px;
}

#inputArea button {
  padding: 14px 22px;
  background: linear-gradient(135deg, #00a884, #25d366);
  border: none;
  color: white;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0, 168, 132, 0.4);
  transition: all 0.2s ease;
}

#inputArea button:hover {
  transform: scale(1.05);
}

#inputArea button:active {
  transform: scale(0.95);
}
#menu {
  cursor: pointer;
  font-size: 24px;
  color: white;
}

#dropdown {
  position: absolute;
  right: 10px;
  top: 50px;
  background: #1f2c33;
  display: none;
  flex-direction: column;
  border-radius: 6px;
  overflow: hidden;
  z-index: 1000;
}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <h2>FunChat Login</h2>

  <input id="u" placeholder="username (lowercase)">
  <input id="p" type="password" placeholder="password (min 4 chars)">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP SCREEN -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">


<div id="topbar">
  <div>FunChat</div>

  <div id="menu" onclick="toggleMenu()">⋮</div>

  <div id="dropdown">
    <div onclick="logout()">Logout</div>
    <div onclick="changeUser()">Change Username</div>
    <div onclick="changePass()">Change Password</div>
  </div>
</div>

<input id="searchBox" placeholder="Search user">

<div id="users"></div>

  <!-- CHAT -->
  <div id="chat">

    <div id="chatHeader">Select a user</div>

    <div id="messages"></div>

    <div id="inputArea">
      <input id="to" placeholder="username">
      <input id="msg" placeholder="message">
<button onclick="send()">➤</button>
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io("https://funchat-g4sw.onrender.com");

let me = "";

/* REGISTER */
function register() {
  socket.emit("register", {
    username: u.value,
    password: p.value
  }, res => {
    alert(res.msg || (res.ok ? "Registered!" : "Failed"));
  });
}

/* LOGIN (FIXED) */
function login() {
  alert("LOGIN CLICKED");
function login() {
  socket.emit("login", {
    username: u.value,
    password: p.value
  }, (res) => {

    if (!res.ok) {
      alert("Login failed");
      return;
    }

    me = res.username;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
  });
}

    // FIXED SCREEN SWITCH
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
  });
}

/* SEND MESSAGE */
function send() {
  socket.emit("dm", {
    to: to.value,
    msg: msg.value
  });

  showMsg({ from: me, msg: msg.value });
  msg.value = "";
}

/* RECEIVE MESSAGE */
socket.on("dm", data => showMsg(data));

function showMsg(data) {
  const div = document.createElement("div");
  div.className = "msg";

  if (data.from === me) div.classList.add("me");
  else div.classList.add("other");

  div.innerText = data.from + ": " + data.msg;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* SEARCH USER */
function searchUser() {
  socket.emit("search", searchBox.value, res => {
    users.innerHTML = "";

    if (!res.ok) return;

    const div = document.createElement("div");
    div.className = "user";
    div.innerText = searchBox.value + (res.online ? " 🟢" : " ⚪");

    div.onclick = () => {
      to.value = searchBox.value;
      chatHeader.innerText = "Chat with " + searchBox.value;
    };

users.appendChild(div);
  });
}

function toggleMenu() {
  const dropdown = document.getElementById("dropdown");

  dropdown.style.display =
    dropdown.style.display === "flex" ? "none" : "flex";
}

</script>


</body>
</html>
